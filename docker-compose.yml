version: "3.8"

services:
  database:
    image: postgres:15
    environment:
      POSTGRES_USER: directus
      POSTGRES_PASSWORD: directus
      POSTGRES_DB: directus
    volumes:
      - ./data:/var/lib/postgresql/data
    networks:
      - cms

  directus:
    image: directus/directus:latest
    ports:
      - 8055:8055
    depends_on:
      - database
    environment:
      SECRET: "supersecretkey"
      DB_CLIENT: "pg"
      DB_HOST: "database"
      DB_PORT: "5432"
      DB_DATABASE: "directus"
      DB_USER: "directus"
      DB_PASSWORD: "directus"
      ADMIN_EMAIL: "admin@admin.com"
      ADMIN_PASSWORD: "admin"
    networks:
      - cms

  frontend:
    image: node:20
    working_dir: /frontend
    volumes:
      - ./frontend:/frontend
    command: sh -c "npm install && npm run dev"
    ports:
      - "4000:4000"
    depends_on:
      - directus
    networks:
      - cms

networks:
  cms:
    driver: bridge